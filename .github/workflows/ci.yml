name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run tsc

            - name: Lint
              run: bun run lint

            - name: Debug file contents
              run: |
                  echo "=== src/utils/log.ts ==="
                  cat -A src/utils/log.ts
                  echo "=== src/ai/system-prompts.ts ==="
                  cat -A src/ai/system-prompts.ts
                  echo "=== hex dumps ==="
                  od -c src/utils/log.ts | head -20
                  od -c src/ai/system-prompts.ts | head -20

            - name: Test
              run: bun test

            - name: Format check
              run: bun run format:check
